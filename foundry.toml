[profile.default]
src = "smart-contracts"
test = "test"
script = "script"
out = "out"
cache_path = "cache"
libs = ["lib"]
solc_version = "0.8.19"
auto_detect_solc = false
evm_version = "paris"
optimizer = true
optimizer_runs = 200
fs_permissions = [
    { access = "read", path = "./test/fixtures" },
    { access = "read", path = "./deployments" },
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
