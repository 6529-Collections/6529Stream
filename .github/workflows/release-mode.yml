name: Release Mode

on:
  workflow_dispatch:
    inputs:
      release_phase:
        description: Release evidence phase to enforce
        required: true
        default: public-beta
        type: choice
        options:
          - public-beta
          - production-release

permissions:
  contents: read

concurrency:
  # Public-beta and production-release dispatches may run independently. The
  # production checker still validates public-beta readiness before production.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.release_phase }}
  cancel-in-progress: false

jobs:
  release-mode:
    name: ${{ inputs.release_phase }} release gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require protected default branch
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" != "branch" ] || [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release mode must run from the default branch: $DEFAULT_BRANCH" >&2
            exit 1
          fi
          if [ "$REF_PROTECTED" != "true" ]; then
            echo "Release mode requires branch protection or an active ruleset on $DEFAULT_BRANCH" >&2
            exit 1
          fi

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d
        with:
          version: v1.7.1

      - name: Install release tooling
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-tools.txt
          solc-select install 0.8.19
          solc-select use 0.8.19
          python3 -m playwright install --with-deps chromium

      - name: Run aggregate release checks
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          bash scripts/check.sh 2>&1 | tee ci-logs/aggregate-check.log

      - name: Run live Slither baseline gate
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          make slither-baseline-check 2>&1 | tee ci-logs/slither-baseline-check.log

      - name: Validate release-mode profile
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 -m py_compile \
            scripts/check_public_beta_evidence.py \
            scripts/check_release_mode.py \
            scripts/test_release_mode.py
          python3 scripts/test_release_mode.py 2>&1 | tee ci-logs/release-mode-tests.log
          python3 scripts/check_release_mode.py --phase "${{ inputs.release_phase }}" 2>&1 | tee ci-logs/release-mode-check.log

      - name: Upload release-mode logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-mode-logs-${{ inputs.release_phase }}
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 14
