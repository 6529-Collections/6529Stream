name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  windows-wrapper:
    name: Windows PowerShell wrapper
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: PowerShell syntax and wrapper runtime
        shell: powershell
        run: |
          $scriptPaths = @(
            "scripts\check.ps1",
            "scripts\bootstrap-windows.ps1",
            "scripts\windows-check-helpers.ps1",
            "scripts\test_windows_check_helpers.ps1"
          )
          foreach ($scriptPath in $scriptPaths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $scriptPath,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              exit 1
            }
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\test_windows_check_helpers.ps1

  foundry:
    name: Foundry smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d
        with:
          version: v1.7.1

      - name: Repository hygiene
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "${{ github.event.before }}...HEAD"
          else
            git diff --check "HEAD^...HEAD"
          fi

          for script in scripts/check.sh scripts/bootstrap-ec2.sh; do
            bash -n "$script"
          done

          python3 -m py_compile \
            scripts/argparse_helpers.py \
            scripts/generate_release_artifacts.py \
            scripts/test_release_artifacts.py \
            scripts/check_metadata_fixtures.py \
            scripts/test_metadata_fixtures.py \
            scripts/check_metadata_browser_sandbox.py \
            scripts/test_metadata_browser_sandbox.py \
            scripts/check_rehearsal_metadata_browser_sandbox.py \
            scripts/test_rehearsal_metadata_browser_sandbox.py \
            scripts/generate_drop_authorization_payload.py \
            scripts/test_drop_authorization_payload_generator.py \
            scripts/check_drop_authorization_fixtures.py \
            scripts/test_drop_authorization_fixtures.py \
            scripts/check_drop_authorization_signing_evidence.py \
            scripts/test_drop_authorization_signing_evidence.py \
            scripts/check_signer_custody_readiness.py \
            scripts/test_signer_custody_readiness.py \
            scripts/generate_source_verification_inputs.py \
            scripts/test_source_verification_inputs.py \
            scripts/check_abi_compatibility.py \
            scripts/test_abi_compatibility.py \
            scripts/generate_broadcast_manifest_input.py \
            scripts/test_broadcast_manifest_input.py \
            scripts/generate_deployment_manifest.py \
            scripts/test_deployment_manifest.py \
            scripts/generate_address_books.py \
            scripts/test_address_books.py \
            scripts/check_ceremony_evidence.py \
            scripts/test_ceremony_evidence.py \
            scripts/check_randomizer_operations.py \
            scripts/test_randomizer_operations.py \
            scripts/check_release_signatures.py \
            scripts/test_release_signatures.py \
            scripts/check_non_local_release_evidence.py \
            scripts/test_non_local_release_evidence.py \
            scripts/check_external_audit_report_evidence.py \
            scripts/test_external_audit_report_evidence.py \
            scripts/check_fork_deployment_rehearsal_evidence.py \
            scripts/test_fork_deployment_rehearsal_evidence.py \
            scripts/check_testnet_deployment_rehearsal_evidence.py \
            scripts/test_testnet_deployment_rehearsal_evidence.py \
            scripts/check_public_beta_evidence.py \
            scripts/test_public_beta_evidence.py \
            scripts/generate_public_beta_blocker_report.py \
            scripts/test_public_beta_blocker_report.py \
            scripts/generate_production_release_blocker_report.py \
            scripts/test_production_release_blocker_report.py \
            scripts/test_release_evidence_packet_index.py \
            scripts/generate_release_evidence_packet_index.py \
            scripts/test_release_evidence_issue_backlog.py \
            scripts/generate_release_evidence_issue_backlog.py \
            scripts/test_release_evidence_issue_links.py \
            scripts/check_release_evidence_issue_links.py \
            scripts/export_release_evidence_issue_snapshot.py \
            scripts/test_release_evidence_issue_snapshot.py \
            scripts/audit_release_evidence_issue_snapshots.py \
            scripts/test_release_evidence_issue_snapshot_audit.py \
            scripts/check_release_evidence_live_audit_report.py \
            scripts/test_release_evidence_live_audit_report.py \
            scripts/check_release_evidence_live_audit_markdown.py \
            scripts/test_release_evidence_live_audit_markdown.py \
            scripts/generate_release_evidence_live_audit_archive.py \
            scripts/test_release_evidence_live_audit_archive.py \
            scripts/test_release_evidence_issue_body_sync.py \
            scripts/generate_release_evidence_issue_body_sync.py \
            scripts/test_release_evidence_issue_bodies.py \
            scripts/check_release_evidence_issue_bodies.py \
            scripts/test_release_evidence_issue_closure.py \
            scripts/check_release_evidence_issue_closure.py \
            scripts/check_architecture_threat_model.py \
            scripts/test_architecture_threat_model.py \
            scripts/check_audit_package.py \
            scripts/test_audit_package.py \
            scripts/check_incident_response.py \
            scripts/test_incident_response.py \
            scripts/check_release_readiness.py \
            scripts/test_release_readiness.py \
            scripts/generate_release_manifest.py \
            scripts/test_release_manifest.py \
            scripts/generate_release_checksums.py \
            scripts/test_release_checksums.py \
            scripts/check_solidity_formatting.py \
            scripts/test_solidity_formatting.py \
            scripts/test_windows_check_wrapper.py \
            scripts/test_windows_ci_wrapper.py \
            scripts/check_changelog.py \
            scripts/test_changelog_check.py

          python3 scripts/test_windows_check_wrapper.py
          python3 scripts/test_windows_ci_wrapper.py

      - name: Install browser test tooling
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-tools.txt
          python3 -m playwright install --with-deps chromium

      - name: PowerShell syntax and wrapper runtime
        shell: pwsh
        run: |
          $scriptPaths = @(
            "scripts/check.ps1",
            "scripts/bootstrap-windows.ps1",
            "scripts/windows-check-helpers.ps1",
            "scripts/test_windows_check_helpers.ps1"
          )
          foreach ($scriptPath in $scriptPaths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $scriptPath,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              exit 1
            }
          }
          & ./scripts/test_windows_check_helpers.ps1

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge build 2>&1 | tee ci-logs/forge-build.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge test -vvv 2>&1 | tee ci-logs/forge-test.log

      - name: Gas snapshot
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge snapshot --match-path test/StreamGasSnapshot.t.sol --check release-artifacts/baselines/v0.1.0/gas-snapshot.snap 2>&1 | tee ci-logs/forge-gas-snapshot.log

      - name: Production size
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge build --sizes --via-ir --skip test --skip script --force 2>&1 | tee ci-logs/forge-size.log

      - name: Solidity formatting
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_solidity_formatting.py 2>&1 | tee ci-logs/solidity-formatting-tests.log
          python3 scripts/check_solidity_formatting.py 2>&1 | tee ci-logs/solidity-formatting-check.log

      - name: Metadata fixture safety
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_metadata_fixtures.py 2>&1 | tee ci-logs/metadata-fixture-tests.log
          python3 scripts/check_metadata_fixtures.py 2>&1 | tee ci-logs/metadata-fixture-check.log
          python3 scripts/test_metadata_browser_sandbox.py 2>&1 | tee ci-logs/metadata-browser-sandbox-tests.log
          python3 scripts/check_metadata_browser_sandbox.py 2>&1 | tee ci-logs/metadata-browser-sandbox-check.log
          python3 scripts/test_rehearsal_metadata_browser_sandbox.py 2>&1 | tee ci-logs/rehearsal-metadata-browser-sandbox-tests.log
          python3 scripts/check_rehearsal_metadata_browser_sandbox.py 2>&1 | tee ci-logs/rehearsal-metadata-browser-sandbox-check.log

      - name: Drop authorization fixtures
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_drop_authorization_payload_generator.py 2>&1 | tee ci-logs/drop-authorization-payload-generator-tests.log
          python3 scripts/generate_drop_authorization_payload.py --input test/fixtures/drop-authorization/payload-generator/fixed-price-input.json --output test/fixtures/drop-authorization/payload-generator/fixed-price-output.json --check 2>&1 | tee ci-logs/drop-authorization-fixed-price-payload-check.log
          python3 scripts/generate_drop_authorization_payload.py --input test/fixtures/drop-authorization/payload-generator/auction-input.json --output test/fixtures/drop-authorization/payload-generator/auction-output.json --check 2>&1 | tee ci-logs/drop-authorization-auction-payload-check.log
          python3 scripts/test_drop_authorization_fixtures.py 2>&1 | tee ci-logs/drop-authorization-fixture-tests.log
          python3 scripts/check_drop_authorization_fixtures.py 2>&1 | tee ci-logs/drop-authorization-fixture-check.log

      - name: Drop authorization signing evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_drop_authorization_signing_evidence.py 2>&1 | tee ci-logs/drop-authorization-signing-evidence-tests.log
          python3 scripts/check_drop_authorization_signing_evidence.py 2>&1 | tee ci-logs/drop-authorization-signing-evidence-check.log

      - name: Signer custody readiness
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_signer_custody_readiness.py 2>&1 | tee ci-logs/signer-custody-readiness-tests.log
          python3 scripts/check_signer_custody_readiness.py 2>&1 | tee ci-logs/signer-custody-readiness-check.log

      - name: Release artifact catalog
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_release_artifacts.py 2>&1 | tee ci-logs/release-artifact-tests.log
          python3 scripts/generate_release_artifacts.py --check 2>&1 | tee ci-logs/release-artifacts-check.log

      - name: Source verification inputs
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_source_verification_inputs.py 2>&1 | tee ci-logs/source-verification-tests.log
          python3 scripts/generate_source_verification_inputs.py --check 2>&1 | tee ci-logs/source-verification-check.log

      - name: Dependency artifacts
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_dependency_artifact_manifest.py 2>&1 | tee ci-logs/dependency-artifact-tests.log
          python3 scripts/generate_dependency_artifact_manifest.py --check 2>&1 | tee ci-logs/dependency-artifact-check.log

      - name: ABI compatibility
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_abi_compatibility.py 2>&1 | tee ci-logs/abi-compatibility-tests.log
          python3 scripts/check_abi_compatibility.py --check 2>&1 | tee ci-logs/abi-compatibility-check.log

      - name: Deployment manifest
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_broadcast_manifest_input.py 2>&1 | tee ci-logs/broadcast-manifest-input-tests.log
          python3 scripts/generate_broadcast_manifest_input.py --check 2>&1 | tee ci-logs/broadcast-manifest-input-check.log
          python3 scripts/generate_broadcast_manifest_input.py --template deployments/config/fork-mainnet-6529stream-v0.1.0-001.json --broadcast deployments/broadcasts/fork-mainnet-6529stream-v0.1.0-001-run-latest.json --output deployments/config/fork-mainnet-6529stream-v0.1.0-001-broadcast.json --manifest-output deployments/examples/fork-mainnet-6529stream-v0.1.0-001-broadcast.json --check 2>&1 | tee ci-logs/fork-broadcast-manifest-input-check.log
          python3 scripts/test_deployment_manifest.py 2>&1 | tee ci-logs/deployment-manifest-tests.log
          python3 scripts/generate_deployment_manifest.py --check 2>&1 | tee ci-logs/deployment-manifest-check.log
          python3 scripts/generate_deployment_manifest.py --config deployments/config/anvil-6529stream-v0.1.0-001-broadcast.json --check 2>&1 | tee ci-logs/deployment-manifest-broadcast-check.log
          python3 scripts/generate_deployment_manifest.py --config deployments/config/fork-mainnet-6529stream-v0.1.0-001-broadcast.json --check 2>&1 | tee ci-logs/fork-deployment-manifest-broadcast-check.log

      - name: Address books
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_address_books.py 2>&1 | tee ci-logs/address-book-tests.log
          python3 scripts/generate_address_books.py --check 2>&1 | tee ci-logs/address-books-check.log

      - name: Ceremony evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_ceremony_evidence.py 2>&1 | tee ci-logs/ceremony-evidence-tests.log
          python3 scripts/check_ceremony_evidence.py 2>&1 | tee ci-logs/ceremony-evidence-check.log

      - name: Randomizer operations evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_randomizer_operations.py 2>&1 | tee ci-logs/randomizer-operations-tests.log
          python3 scripts/check_randomizer_operations.py 2>&1 | tee ci-logs/randomizer-operations-check.log

      - name: Release signature evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_release_signatures.py 2>&1 | tee ci-logs/release-signature-tests.log
          python3 scripts/check_release_signatures.py 2>&1 | tee ci-logs/release-signature-check.log

      - name: Non-local release evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_non_local_release_evidence.py 2>&1 | tee ci-logs/non-local-release-evidence-tests.log
          python3 scripts/check_non_local_release_evidence.py 2>&1 | tee ci-logs/non-local-release-evidence-check.log
          python3 scripts/test_external_audit_report_evidence.py 2>&1 | tee ci-logs/external-audit-report-evidence-tests.log
          python3 scripts/check_external_audit_report_evidence.py 2>&1 | tee ci-logs/external-audit-report-evidence-check.log
          python3 scripts/test_fork_deployment_rehearsal_evidence.py 2>&1 | tee ci-logs/fork-deployment-rehearsal-evidence-tests.log
          python3 scripts/check_fork_deployment_rehearsal_evidence.py 2>&1 | tee ci-logs/fork-deployment-rehearsal-evidence-check.log
          python3 scripts/test_testnet_deployment_rehearsal_evidence.py 2>&1 | tee ci-logs/testnet-deployment-rehearsal-evidence-tests.log
          python3 scripts/check_testnet_deployment_rehearsal_evidence.py 2>&1 | tee ci-logs/testnet-deployment-rehearsal-evidence-check.log

      - name: Public beta evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_public_beta_evidence.py 2>&1 | tee ci-logs/public-beta-evidence-tests.log
          python3 scripts/check_public_beta_evidence.py 2>&1 | tee ci-logs/public-beta-evidence-check.log
          python3 scripts/test_public_beta_blocker_report.py 2>&1 | tee ci-logs/public-beta-blocker-report-tests.log
          python3 scripts/generate_public_beta_blocker_report.py --check 2>&1 | tee ci-logs/public-beta-blocker-report-check.log
          python3 scripts/test_production_release_blocker_report.py 2>&1 | tee ci-logs/production-release-blocker-report-tests.log
          python3 scripts/generate_production_release_blocker_report.py --check 2>&1 | tee ci-logs/production-release-blocker-report-check.log
          python3 scripts/test_release_evidence_packet_index.py 2>&1 | tee ci-logs/release-evidence-packet-index-tests.log
          python3 scripts/generate_release_evidence_packet_index.py --check 2>&1 | tee ci-logs/release-evidence-packet-index-check.log
          python3 scripts/test_release_evidence_issue_backlog.py 2>&1 | tee ci-logs/release-evidence-issue-backlog-tests.log
          python3 scripts/generate_release_evidence_issue_backlog.py --check 2>&1 | tee ci-logs/release-evidence-issue-backlog-check.log
          python3 scripts/test_release_evidence_issue_links.py 2>&1 | tee ci-logs/release-evidence-issue-links-tests.log
          python3 scripts/check_release_evidence_issue_links.py 2>&1 | tee ci-logs/release-evidence-issue-links-check.log
          python3 scripts/test_release_evidence_issue_snapshot.py 2>&1 | tee ci-logs/release-evidence-issue-snapshot-tests.log
          python3 scripts/test_release_evidence_issue_snapshot_audit.py 2>&1 | tee ci-logs/release-evidence-issue-snapshot-audit-tests.log
          python3 scripts/test_release_evidence_issue_labels.py 2>&1 | tee ci-logs/release-evidence-issue-labels-tests.log
          python3 scripts/check_release_evidence_issue_labels.py 2>&1 | tee ci-logs/release-evidence-issue-labels-check.log
          python3 scripts/test_release_evidence_issue_body_sync.py 2>&1 | tee ci-logs/release-evidence-issue-body-sync-tests.log
          python3 scripts/generate_release_evidence_issue_body_sync.py --check 2>&1 | tee ci-logs/release-evidence-issue-body-sync-check.log
          python3 scripts/test_release_evidence_issue_bodies.py 2>&1 | tee ci-logs/release-evidence-issue-bodies-tests.log
          python3 scripts/check_release_evidence_issue_bodies.py 2>&1 | tee ci-logs/release-evidence-issue-bodies-check.log
          python3 scripts/test_release_evidence_issue_closure.py 2>&1 | tee ci-logs/release-evidence-issue-closure-tests.log
          python3 scripts/check_release_evidence_issue_closure.py 2>&1 | tee ci-logs/release-evidence-issue-closure-check.log
          python3 scripts/test_release_evidence_live_audit_report.py 2>&1 | tee ci-logs/release-evidence-live-audit-report-tests.log
          python3 scripts/check_release_evidence_live_audit_report.py 2>&1 | tee ci-logs/release-evidence-live-audit-report-check.log
          python3 scripts/test_release_evidence_live_audit_markdown.py 2>&1 | tee ci-logs/release-evidence-live-audit-markdown-tests.log
          python3 scripts/check_release_evidence_live_audit_markdown.py 2>&1 | tee ci-logs/release-evidence-live-audit-markdown-check.log
          python3 scripts/test_release_evidence_live_audit_archive.py 2>&1 | tee ci-logs/release-evidence-live-audit-archive-tests.log
          python3 scripts/generate_release_evidence_live_audit_archive.py --check 2>&1 | tee ci-logs/release-evidence-live-audit-archive-check.log

      - name: Architecture and threat model
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_architecture_threat_model.py 2>&1 | tee ci-logs/architecture-threat-model-tests.log
          python3 scripts/check_architecture_threat_model.py 2>&1 | tee ci-logs/architecture-threat-model-check.log

      - name: Audit package
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_audit_package.py 2>&1 | tee ci-logs/audit-package-tests.log
          python3 scripts/check_audit_package.py 2>&1 | tee ci-logs/audit-package-check.log

      - name: Incident response
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_incident_response.py 2>&1 | tee ci-logs/incident-response-tests.log
          python3 scripts/check_incident_response.py 2>&1 | tee ci-logs/incident-response-check.log

      - name: Release readiness
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_release_readiness.py 2>&1 | tee ci-logs/release-readiness-tests.log
          python3 scripts/check_release_readiness.py 2>&1 | tee ci-logs/release-readiness-check.log

      - name: Release manifest
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_release_manifest.py 2>&1 | tee ci-logs/release-manifest-tests.log
          python3 scripts/generate_release_manifest.py --check 2>&1 | tee ci-logs/release-manifest-check.log

      - name: Release checksums
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_release_checksums.py 2>&1 | tee ci-logs/release-checksum-tests.log
          python3 scripts/generate_release_checksums.py --check 2>&1 | tee ci-logs/release-checksums-check.log

      - name: Changelog gate
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 scripts/test_changelog_check.py 2>&1 | tee ci-logs/changelog-tests.log

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${{ github.event.before }}"
          else
            base_ref=""
          fi

          if [ -n "$base_ref" ]; then
            python3 scripts/check_changelog.py --base-ref "$base_ref" 2>&1 | tee ci-logs/changelog-check.log
          else
            python3 scripts/check_changelog.py 2>&1 | tee ci-logs/changelog-check.log
          fi

      - name: Deployment rehearsal
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge script script/RehearseDeployment.s.sol:RehearseDeployment --sig "run()" --via-ir 2>&1 | tee ci-logs/forge-deployment-rehearsal.log
          forge script script/RehearseAuctionCeremony.s.sol:RehearseAuctionCeremony --sig "run()" --via-ir 2>&1 | tee ci-logs/forge-auction-ceremony-rehearsal.log
          forge script script/RehearseEmergencyRedeployment.s.sol:RehearseEmergencyRedeployment --sig "run()" --via-ir 2>&1 | tee ci-logs/forge-emergency-redeployment-rehearsal.log

      - name: Upload Foundry logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: foundry-smoke-logs
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 14
