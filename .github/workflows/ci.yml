name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundry:
    name: Foundry smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d
        with:
          version: v1.7.1

      - name: Repository hygiene
        shell: bash
        run: |
          git diff --check
          bash -n scripts/check.sh scripts/bootstrap-ec2.sh

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $scriptPaths = @(
            "scripts/check.ps1",
            "scripts/bootstrap-windows.ps1"
          )
          foreach ($scriptPath in $scriptPaths) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content -Raw $scriptPath),
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              exit 1
            }
          }

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge build 2>&1 | tee ci-logs/forge-build.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          forge test -vvv 2>&1 | tee ci-logs/forge-test.log

      - name: Upload Foundry logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: foundry-smoke-logs
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 14
